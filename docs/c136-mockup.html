<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Yahdle c136 — N-player screens mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --w50:#faf5ff;--w100:#f3e8ff;--w200:#e9d5ff;--w300:#d8b4fe;--w400:#c084fc;
    --w500:#a855f7;--w600:#9333ea;--w700:#7e22ce;--w800:#6b21a8;--w900:#581c87;
    --card:#181c25;--bg:#0f1218;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;
    -webkit-font-smoothing:antialiased;padding-bottom:60px}
  .wrap{max-width:480px;margin:0 auto;padding:12px}
  .disp{font-family:'Fredoka',cursive}
  .card{background:var(--card);border:1px solid rgba(255,255,255,.10);border-radius:14px}
  .muted{opacity:.6}
  .eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.08em;opacity:.55;font-weight:800}
  .avatar{border-radius:999px;display:flex;align-items:center;justify-content:center;
    font-weight:800;color:#fff;flex:none}
  /* ── mockup controls ── */
  .controls{position:sticky;top:0;z-index:20;background:#13182080;backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(255,255,255,.08);padding:8px 12px}
  .controls .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;max-width:480px;margin:0 auto}
  .controls label{font-size:11px;font-weight:800;opacity:.7;margin-right:6px}
  .seg{display:inline-flex;background:#00000040;border:1px solid rgba(255,255,255,.10);
    border-radius:9px;padding:2px}
  .seg button{border:0;background:transparent;color:var(--w300);font-weight:800;font-size:12px;
    padding:4px 10px;border-radius:7px;cursor:pointer}
  .seg button.on{background:var(--w500);color:#fff}
  .note{font-size:10px;opacity:.45;max-width:480px;margin:4px auto 0;text-align:center}
  /* ── section framing ── */
  .section-label{font-size:12px;font-weight:900;color:var(--w300);margin:22px 4px 8px;
    display:flex;align-items:center;gap:8px}
  .section-label::before{content:"";flex:1;height:1px;background:rgba(255,255,255,.10)}
  .section-label::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.10)}
  .pad{padding:12px}
  /* turn banner */
  .turnbar{background:linear-gradient(135deg,var(--w600),var(--w800));border-radius:12px;
    padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
  .turnbar .big{font-weight:900;font-size:16px}
  .pill{font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;background:#ffffff22}
  /* opponent chips (A) */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px}
  .chip{flex:none;min-width:96px;background:#00000030;border:1px solid rgba(255,255,255,.10);
    border-radius:12px;padding:8px;text-align:center;cursor:pointer;position:relative}
  .chip.turn{border-color:var(--w400);box-shadow:0 0 0 2px var(--w500) inset}
  .chip .nm{font-weight:800;font-size:12px;margin-top:4px}
  .chip .sc{font-weight:900;font-size:15px}
  .chip .now{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:999px;background:#34d399;
    box-shadow:0 0 6px #34d399}
  /* opponent rows (B) */
  .oprow{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer}
  .oprow+.oprow{margin-top:6px}
  .oprow.turn{background:linear-gradient(90deg,#9333ea33,transparent);border:1px solid var(--w600)}
  .oprow .nm{font-weight:800;font-size:13px}
  .oprow .sc{margin-left:auto;font-weight:900;font-size:16px}
  .turntag{font-size:10px;font-weight:800;color:#34d399}
  /* popup tabs */
  .tabs{display:flex;gap:6px;margin-bottom:10px}
  .tabs button{flex:1;border:1px solid rgba(255,255,255,.10);background:#00000030;color:var(--w300);
    border-radius:9px;padding:7px 4px;font-weight:800;font-size:12px;cursor:pointer;display:flex;
    align-items:center;justify-content:center;gap:6px}
  .tabs button.on{background:var(--w500);color:#fff;border-color:var(--w400)}
  .catgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .catcell{border-radius:9px;padding:6px 8px;border:1px solid;font-size:12px}
  .catcell.filled{background:var(--w200);border-color:var(--w300);color:var(--w800)}
  .catcell.empty{background:#ffffff05;border-color:rgba(255,255,255,.10);opacity:.6}
  .catcell .cn{font-weight:800;font-size:11px}
  .catcell .cv{font-weight:900}
  /* game over grid (variant 1) */
  .gobanner{border-radius:12px;padding:14px;text-align:center;
    background:linear-gradient(135deg,var(--w600),var(--w800))}
  .gobanner .em{font-size:30px}
  .gobanner .t{font-weight:900;font-size:18px}
  .gtable{width:100%;border-collapse:collapse;font-size:12px}
  .gtable th,.gtable td{padding:5px 4px;text-align:right}
  .gtable th:first-child,.gtable td:first-child{text-align:left;font-weight:800}
  .gtable thead th{font-weight:900}
  .gtable tbody tr:nth-child(even){background:#ffffff05}
  .gtable td.lead{color:#34d399;font-weight:900}
  .gtable tfoot td{border-top:1px solid rgba(255,255,255,.12);font-weight:900;padding-top:8px}
  .colhead{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  /* leaderboard (variant 2) */
  .lbrow{display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;margin-top:8px;
    background:#00000030;border:1px solid rgba(255,255,255,.08)}
  .lbrow.win{border-color:var(--w400);background:linear-gradient(90deg,#9333ea33,#00000030)}
  .lbrow .rk{font-size:20px;width:26px;text-align:center}
  .lbrow .nm{font-weight:900}
  .lbrow .sc{margin-left:auto;font-weight:900;font-size:20px}
  .tag{font-size:10px;font-weight:900;padding:2px 8px;border-radius:999px}
  .tag.w{background:#34d39933;color:#6ee7b7}
  .tag.l{background:#ffffff14;color:#cbd5e1}
  details.cats{margin-top:10px}
  details.cats summary{cursor:pointer;font-weight:800;font-size:12px;color:var(--w300);padding:6px 2px}
  /* waiting room */
  .slots{display:flex;gap:10px;justify-content:center;margin:12px 0}
  .slot{width:54px;text-align:center}
  .slot .ring{width:46px;height:46px;border-radius:999px;margin:0 auto 4px;display:flex;
    align-items:center;justify-content:center;font-weight:800}
  .slot.empty .ring{border:2px dashed rgba(255,255,255,.25);color:rgba(255,255,255,.4);font-size:20px}
  .slot .sn{font-size:11px;font-weight:800}
  .btn{display:block;width:100%;text-align:center;background:var(--w500);color:#fff;font-weight:900;
    border:0;border-radius:11px;padding:12px;font-size:15px;cursor:pointer;margin-top:6px}
</style>
</head>
<body>
  <div class="controls">
    <div class="row">
      <span><label>Players</label>
        <span class="seg" id="seg-players">
          <button data-v="2">2</button><button data-v="3">3</button><button data-v="4" class="on">4</button>
        </span></span>
      <span><label>Opponent bar</label>
        <span class="seg" id="seg-bar">
          <button data-v="A" class="on">A · chips</button><button data-v="B">B · rows</button>
        </span></span>
      <span><label>Game over</label>
        <span class="seg" id="seg-go">
          <button data-v="1" class="on">1 · grid</button><button data-v="2">2 · board</button>
        </span></span>
    </div>
    <div class="note">Mockup controls — not part of the game. Toggle to compare layouts.</div>
  </div>

  <div class="wrap">
    <div class="section-label">In-game · top of board (your turn + opponents)</div>
    <div id="ingame"></div>

    <div class="section-label">Tap an opponent → score popup (tabbed across opponents)</div>
    <div id="popup"></div>

    <div class="section-label">Game over</div>
    <div id="gameover"></div>

    <div class="section-label">Waiting room (open game filling up)</div>
    <div id="waiting"></div>
  </div>

<script>
const CATS = ['3-Letter','4-Letter','Lexicon','Double Up','Vowel Heavy','Consonant Heavy','High Value','Low Ball','Bookends','No Repeats','Long Shot','Wild Card'];
// You + up to 3 opponents. You & Cara tie at 118 to show "tied for 1st = both win".
const ALL = [
  {name:'You', hue:152, me:true, s:[9,12,15,8,7,6,18,4,10,9,14,6]},   // 118
  {name:'Bob', hue:18,  s:[8,10,12,9,6,7,16,5,9,8,10,4]},             // 104
  {name:'Cara',hue:285, s:[10,11,14,7,8,5,17,6,11,7,12,10]},          // 118
  {name:'Dan', hue:205, s:[6,7,8,5,4,5,9,3,6,4,6,4]},                 // 67
];
const total = p => p.s.reduce((a,b)=>a+b,0);
const state = {players:4, bar:'A', go:'1', tab:1};

function roster(){ return ALL.slice(0, state.players); }
function opps(){ return roster().filter(p=>!p.me); }
function avatar(p,size){ return `<div class="avatar" style="width:${size}px;height:${size}px;background:hsl(${p.hue} 55% 50%);font-size:${size*0.42}px">${p.name[0]}</div>`; }

function renderIngame(){
  const o = opps();
  // assume it's Bob's turn (first opponent) for the demo
  const turnName = o[0]?.name ?? '—';
  let bar;
  if(state.bar==='A'){
    bar = `<div class="chips">${o.map((p,i)=>`
      <div class="chip ${i===0?'turn':''}" onclick="openTab(${ALL.indexOf(p)})">
        ${i===0?'<span class="now"></span>':''}
        <div style="display:flex;justify-content:center">${avatar(p,30)}</div>
        <div class="nm">${p.name}</div><div class="sc">${total(p)}</div>
      </div>`).join('')}</div>`;
  } else {
    bar = `<div>${o.map((p,i)=>`
      <div class="oprow ${i===0?'turn':''}" onclick="openTab(${ALL.indexOf(p)})">
        ${avatar(p,34)}
        <div><div class="nm">${p.name}</div>${i===0?'<div class="turntag">● playing now</div>':'<div class="muted" style="font-size:11px">tap to view card</div>'}</div>
        <div class="sc">${total(p)}</div>
      </div>`).join('')}</div>`;
  }
  document.getElementById('ingame').innerHTML = `
    <div class="turnbar" style="margin-bottom:10px">
      <div><div class="big">Waiting for ${turnName}…</div>
      <div class="pill" style="margin-top:4px">Your score ${total(ALL[0])} · turn 9/12</div></div>
      <div>${avatar(ALL[0],40)}</div>
    </div>
    <div class="card pad"><div class="eyebrow" style="margin-bottom:8px">Opponents (${o.length})</div>${bar}</div>`;
}

function openTab(idx){ state.tab = idx; renderPopup(); document.getElementById('popup').scrollIntoView({behavior:'smooth',block:'center'}); }

function renderPopup(){
  const o = opps();
  if(!o.length){ document.getElementById('popup').innerHTML = `<div class="card pad muted">No opponents at 2 players besides the single sheet (unchanged from today).</div>`; return; }
  if(!o.includes(ALL[state.tab])) state.tab = ALL.indexOf(o[0]);
  const p = ALL[state.tab];
  const tabs = o.map(q=>`<button class="${q===p?'on':''}" onclick="state.tab=${ALL.indexOf(q)};renderPopup()">${avatar(q,18)} ${q.name} · ${total(q)}</button>`).join('');
  const grid = CATS.map((c,i)=>`<div class="catcell filled"><div class="cn">${c}</div><div class="cv">${p.s[i]}</div></div>`).join('');
  document.getElementById('popup').innerHTML = `
    <div class="card pad">
      ${o.length>1?`<div class="tabs">${tabs}</div>`:''}
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        ${avatar(p,36)}<div><div style="font-weight:900">${p.name}</div>
        <div class="muted" style="font-size:11px">${total(p)} points · turn 9/12</div></div></div>
      <div class="eyebrow" style="margin-bottom:6px">Last play</div>
      <div class="muted" style="font-size:12px;margin-bottom:10px">"QUARTZ" → High Value · 18 pts</div>
      <div class="catgrid">${grid}</div>
    </div>`;
}

function renderGameOver(){
  const r = roster();
  const max = Math.max(...r.map(total));
  const winners = r.filter(p=>total(p)===max);
  const youWin = total(ALL[0])===max;
  const sub = winners.length>1
    ? (youWin ? `Tied for 1st with ${winners.filter(p=>!p.me).map(p=>p.name).join(', ')}` : `${winners.map(p=>p.name).join(' & ')} tied for 1st`)
    : `${winners[0].name==='You'?'You':winners[0].name} on top · ${max} pts`;
  const banner = `<div class="gobanner"><div class="em">🏆</div>
    <div class="t">${youWin?'You win!':winners[0].name+' wins!'}</div>
    <div style="opacity:.9;font-size:13px;margin-top:2px">${sub}</div></div>`;

  let body;
  if(state.go==='1'){
    const head = r.map(p=>`<th><div class="colhead">${avatar(p,22)}<span style="font-size:10px">${p.name}</span></div></th>`).join('');
    const rows = CATS.map((c,i)=>{
      const vals = r.map(p=>p.s[i]); const m=Math.max(...vals);
      return `<tr><td>${c}</td>${r.map(p=>`<td class="${p.s[i]===m?'lead':''}">${p.s[i]}</td>`).join('')}</tr>`;
    }).join('');
    const tot = r.map(p=>`<td class="${total(p)===max?'lead':''}">${total(p)}</td>`).join('');
    body = `<div class="card pad" style="overflow-x:auto">
      <table class="gtable"><thead><tr><th>Category</th>${head}</tr></thead>
      <tbody>${rows}</tbody><tfoot><tr><td>Total</td>${tot}</tr></tfoot></table></div>`;
  } else {
    const sorted = [...r].sort((a,b)=>total(b)-total(a));
    const medals=['🥇','🥈','🥉','4️⃣'];
    const lb = sorted.map((p,i)=>{
      const win = total(p)===max;
      return `<div class="lbrow ${win?'win':''}">
        <div class="rk">${win?'🥇':medals[i]}</div>${avatar(p,38)}
        <div><div class="nm">${p.name}</div></div>
        <div class="sc">${total(p)}</div>
        <span class="tag ${win?'w':'l'}">${win?'WIN':'LOSS'}</span></div>`;
    }).join('');
    const head = r.map(p=>`<th><span style="font-size:10px">${p.name}</span></th>`).join('');
    const rows = CATS.map((c,i)=>{const vals=r.map(p=>p.s[i]);const m=Math.max(...vals);
      return `<tr><td>${c}</td>${r.map(p=>`<td class="${p.s[i]===m?'lead':''}">${p.s[i]}</td>`).join('')}</tr>`;}).join('');
    body = `<div>${lb}</div>
      <details class="cats"><summary>Per-category breakdown ▾</summary>
      <div class="card pad" style="overflow-x:auto;margin-top:6px"><table class="gtable">
      <thead><tr><th>Category</th>${head}</tr></thead><tbody>${rows}</tbody></table></div></details>`;
  }
  document.getElementById('gameover').innerHTML = banner + '<div style="height:10px"></div>' + body +
    `<button class="btn">Rematch</button>`;
}

function renderWaiting(){
  const r = roster();
  const joined = Math.min(2, r.length);
  let slots = '';
  for(let i=0;i<state.players;i++){
    if(i<joined){ const p=r[i]; slots += `<div class="slot"><div class="ring avatar" style="background:hsl(${p.hue} 55% 50%)">${p.name[0]}</div><div class="sn">${p.name}</div></div>`; }
    else { slots += `<div class="slot empty"><div class="ring">+</div><div class="sn muted">open</div></div>`; }
  }
  document.getElementById('waiting').innerHTML = `
    <div class="card pad" style="text-align:center">
      <div class="eyebrow">Open game</div>
      <div class="disp" style="font-size:18px;margin:4px 0 2px">${joined} of ${state.players} players</div>
      <div class="muted" style="font-size:12px">Starts automatically when ${state.players} players are in.</div>
      <div class="slots">${slots}</div>
      <div class="muted" style="font-size:12px">Waiting for ${state.players-joined} more…</div>
    </div>`;
}

function renderAll(){ renderIngame(); renderPopup(); renderGameOver(); renderWaiting(); }

function wire(id,key,cast){ document.querySelectorAll('#'+id+' button').forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll('#'+id+' button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); state[key]=cast?cast(b.dataset.v):b.dataset.v; renderAll(); }; }); }
wire('seg-players','players',v=>+v); wire('seg-bar','bar'); wire('seg-go','go');
renderAll();
</script>
</body>
</html>
