<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/yahdle/favicon.svg" />
    <link rel="manifest" href="/yahdle/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yahdle" />
    <link rel="apple-touch-icon" href="/yahdle/favicon.svg" />
    <title>Yahdle 🎲</title>
    <!-- Self-hosted SQ fonts. Files live in rae-side-quest/public/fonts/
         and serve at /games/fonts/... (same origin for all SQ surfaces).
         @font-face declarations live in sq-ui/globals.css. -->
    <link rel="preload" href="/games/fonts/fredoka-one-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/games/fonts/nunito.woff2" as="font" type="font/woff2" crossorigin />
    <!-- GitHub Pages SPA redirect: restore path from query string (see public/404.html) -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <!-- Prevent flash of wrong theme: apply dark class synchronously before React renders.
         Keep the legacy fallback list in sync with all SQ games' localStorage keys. -->
    <script>if((localStorage.getItem('sq-theme')||localStorage.getItem('wordy-theme')||localStorage.getItem('rungles-theme')||localStorage.getItem('snibble-theme')||localStorage.getItem('yahdle-theme'))==='dark')document.documentElement.classList.add('dark')</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
